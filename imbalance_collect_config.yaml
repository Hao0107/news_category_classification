# File yaml dung de cau hinh cach crawl du lieu tu cac trang tin tuc khac nhau.
# Moi trang se co selector rieng de tim link bai viet, tieu de va tom tat. 
# Cung nhu template de tao url cho cac trang tiep theo khi crawl du lieu.

# cau hinh cho tung trang tin tuc
sites:
  vnexpress.net:
    article_link_selector: "h3.title-news a"
    pagination_template: "{base_url}-p{page}"
    title_selector: "h1.title-detail"
    abstract_selector: "p.description"
    remove_selectors: 
      - "span.location-stamp"
      - ".relative_new"

  thanhnien.vn:
    article_link_selector: ".box-category-item .box-category-link-title"
    pagination_template: "{base_url}/trang-{page}.htm"
    title_selector: "h1.detail-title"
    abstract_selector: "h2.detail-sapo"
    remove_selectors: []

  dantri.com.vn:
    article_link_selector: "h3.article-title a"
    pagination_template: "{base_url}/trang-{page}.htm"
    title_selector: "h1.title-page, h1.e-title, h1.article-title, h1"
    abstract_selector: "h2[data-slot='sapo'], h2.singular-sapo, div.singular-sapo, h2.sapo, h2.e-sapo, h2.e-magazine__sapo"
    remove_selectors: []

  tuoitre.vn:
    article_link_selector: ".box-category-item .box-title-text a, h3.box-title-text a, .box-category-title a"
    pagination_template: "{base_url}/trang-{page}.htm"
    title_selector: "h1.detail-title, h1.article-title, h1.title-detail"
    abstract_selector: "h2.detail-sapo, div.detail-sapo, h2.sapo"
    remove_selectors: []

  vietnamnet.vn:
    article_link_selector: ".vnn-title a"
    pagination_template: "{base_url}-page{page}"
    title_selector: "h1.content-detail-title"
    abstract_selector: "h2.content-detail-sapo"
    remove_selectors: []

  # laodong.vn:
  #   article_link_selector: "h4.art-title a"
  #   pagination_template: "{base_url}?page={page}"
  #   title_selector: "h1.title"
  #   abstract_selector: "p.abs"

  # plo.vn:
  #   article_link_selector: "article.story a.story__title"
  #   pagination_template: "{base_url}-page{page}.html"
  #   title_selector: "h1.article__title"
  #   abstract_selector: "div.article__sapo"

